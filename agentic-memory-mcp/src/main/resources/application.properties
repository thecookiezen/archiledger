spring.main.banner-mode=off
spring.application.name=archiledge-agentic-memory
spring.ai.mcp.server.name=archiledge-agentic-memory
spring.ai.mcp.server.version=1.0.0
spring.ai.mcp.server.protocol=STREAMABLE
server.port=8080
embabel.models.default-llm=glm-5
logging.level.root=INFO
spring.lifecycle.timeout-per-shutdown-phase=5s

# === ARCHILEDGER CORE CONFIGURATION ===
# Embedding dimensions (must match your embedding model)
# all-MiniLM-L6-v2: 384, bge-small-en-v1.5: 384, nomic-embed-text: 768, text-embedding-3-small: 1536
ladybugdb.embedding.dimensions=384

# LadybugDB data path (empty = in-memory)
# ladybugdb.data-path=/path/to/archiledger.lbdb
# ladybugdb.extension-dir=  # optional: custom directory for LadybugDB extension cache
# ladybugdb.pool.max-total=10
# ladybugdb.pool.max-idle=5
# ladybugdb.pool.min-idle=2

# === HNSW INDEX CONFIGURATION ===
# mu: Max degree Upper - lower values = faster search, less memory
ladybugdb.hnsw.mu=30
# ml: Max degree Lower - higher = better recall, more memory
ladybugdb.hnsw.ml=60
# pu: Sampling rate for upper graph (0.0-1.0) - 0.1 = 10% of nodes in highway layer
ladybugdb.hnsw.pu=0.1
# efc: Construction effort - higher = better index quality, slower indexing
ladybugdb.hnsw.efc=300
# metric: Distance metric (cosine, euclidean, dot_product)
ladybugdb.hnsw.metric=cosine

# === EMBEDDING MODEL CONFIGURATION ===
# By default uses local ONNX transformers (spring-ai-starter-model-transformers)
# 
# For HuggingFace models, set the model and tokenizer URIs:
# Example: all-MiniLM-L6-v2 (default, 384 dims, ~80MB)
# Example: bge-small-en-v1.5 (384 dims, ~120MB, better quality)
# spring.ai.embedding.transformer.onnx.modelUri=https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/onnx/model.onnx
# spring.ai.embedding.transformer.tokenizer.uri=https://huggingface.co/BAAI/bge-small-en-v1.5/resolve/main/tokenizer.json
#
# For OpenAI-compatible APIs (OpenAI, ZhiPu AI, Mistral, etc.):
# - Configure: spring.ai.openai.base-url, spring.ai.openai.api-key, spring.ai.openai.embedding.options.model
#
# For Ollama (via OpenAI-compatible endpoint):
# - spring.ai.openai.base-url=http://localhost:11434
# - spring.ai.openai.embedding.options.model=nomic-embed-text

# CORS configuration
cors.enabled=true
cors.allow_any_origin=true
# cors.origins=https://www.your-app.example.com,https://staging.your-app.example.com
# cors.match_origins=^http://localhost:\\d+$,^https://([a-z0-9]+[.])*.api.example.com$
# cors.allow_credentials=true

agenticmemory.neighbors-k=5
agenticmemory.chat-llm.model=glm-5
agenticmemory.chat-llm.temperature=0.3